name: financier
description: A powerful personal finance tracker with Supabase sync.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Backend & Auth
  supabase_flutter: ^2.8.3

  # Local Storage (Offline-first)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5

  # Navigation
  go_router: ^14.8.1

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  fl_chart: ^0.70.2
  intl: ^0.19.0
  flutter_svg: ^2.0.17
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1

  # Utils
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  logger: ^2.5.0
  connectivity_plus: ^6.1.2
  timeago: ^3.7.0
  share_plus: ^10.1.4
  flutter_local_notifications: ^18.0.1
  equatable: ^2.0.7
  shared_preferences: ^2.3.4
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  mockito: ^5.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/fonts/
